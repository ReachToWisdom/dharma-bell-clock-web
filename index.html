<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modal.css">
  <title>수행시계</title>
</head>
<body>

  <!-- 시계 화면 -->
  <div id="clock-screen">
    <div id="date-display"></div>
    <div id="time-wrapper">
      <span id="period-display"></span>
      <span id="time-display">0:00</span>
    </div>
    <div id="countdown-display"></div>
    <div id="watchdog-badge" class="hidden"></div>
  </div>

  <!-- 하단 메뉴 (5버튼) -->
  <div id="menu" class="hidden">
    <button id="btn-bell" class="menu-btn" data-action="bell">🔔 종소리</button>
    <button id="btn-mp3" class="menu-btn" data-action="mp3">🎵 시간별 MP3</button>
    <button id="btn-settings" class="menu-btn" data-action="settings">⚙️ 설정</button>
    <button id="btn-alarm" class="menu-btn" data-action="alarm">🔊 알림 ON</button>
    <button id="btn-exit" class="menu-btn" data-action="exit">⏻ 종료</button>
  </div>

  <!-- 모달 오버레이 -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-content">
      <div id="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- 스크립트 (의존성 순서) -->
  <script src="js/config.js?v=3"></script>
  <script src="js/settings.js?v=3"></script>
  <script src="js/bell-cache.js?v=3"></script>
  <script src="js/voice.js?v=3"></script>
  <script src="js/audio-core.js?v=3"></script>
  <script src="js/audio.js?v=3"></script>
  <script src="js/clock.js?v=3"></script>
  <script src="js/watchdog.js?v=3"></script>
  <script src="js/ui.js?v=3"></script>
  <script src="js/ui-modals.js?v=3"></script>
  <script src="js/app.js?v=3"></script>

</body>
</html>
